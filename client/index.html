<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QuizCraft – Transform course materials into interactive AI-powered quizzes in seconds. Real-time sessions, adaptive learning, and instant engagement." />
    <meta name="theme-color" content="#0f0a1e" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>QuizCraft – AI-Powered Interactive Quiz Platform</title>
    <script>
      (function() {
        var theme;
        try {
          theme = localStorage.getItem('theme');
        } catch {}
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        }
        document.documentElement.style.setProperty('color-scheme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
